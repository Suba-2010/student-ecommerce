<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <h2>Student Store</h2>
  <div class="nav-right">
    <input type="text" id="search" placeholder="Search products..." class="search-bar">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
    <a href="#" onclick="logout()">Logout</a>
     <button onclick="document.body.classList.toggle('dark')">🌙</button>
  </div>
</div>

<div class="container">

  <!-- 🔽 SIDEBAR -->
  <div class="sidebar">

    <h3>Filters</h3>

    <label>Category</label>
    <select id="category">
      <option value="">All</option>
      <option value="Notebook">Notebook</option>
      <option value="Pen">Pen</option>
      <option value="Backpack">Backpack</option>
      <option value="Bottle">Bottle</option>
    </select>

    <label>Max Price</label>
    <input type="range" id="priceRange" min="0" max="1000" step="50">
    <p id="priceValue">Rs.1000</p>

  </div>

  <!-- 🛍️ PRODUCTS -->
  <div id="product-list"></div>

</div>

<script src="js/products.js"></script>

</body>
</html>
